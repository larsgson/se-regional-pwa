[build]
  command = "pnpm build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  # All optional — the data repo is public, zero config builds by default:
  # DATA_REPO          → override data-repo slug (default larsgson/se-regional-data)
  # DATA_RELEASE_TAG   → pin a tag (default "latest")
  # GITHUB_TOKEN       → rate-limit headroom on shared CI; not required

# Cache the extracted data between builds so we only re-download when the
# release tag actually changes. The prebuild script compares `data/pkf/.fetched-tag`
# against the remote tag and short-circuits when they match.
[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = ["data/pkf"]

# Long-cache immutable pkf / catalog / font / CSS assets (hashed filenames).
[[headers]]
  for = "/pkf/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pkf archives are fflate-packed; hint content-type so browsers don't sniff.
[[headers]]
  for = "/pkf/*.pkf"
  [headers.values]
    Content-Type = "application/octet-stream"
    Cache-Control = "public, max-age=31536000, immutable"
