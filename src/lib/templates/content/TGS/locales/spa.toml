# The Grand Story - Spanish locale

title = "La Gran Historia"
longTitle = "La Gran Historia de la Biblia"
description = "Un recorrido por los momentos clave de la Biblia — de principio a fin."

[01]
title = "Escenas del Antiguo Testamento"
description = "La historia del pueblo de Dios — cómo comenzó todo, su camino, y la promesa de un salvador que vendría."

[01.01]
title = "En el principio"
description = "Dios crea los cielos y la tierra, la luz y las tinieblas, y forma al hombre del polvo de la tierra."

[01.02]
title = "Del Edén a Babel"
description = "La caída del hombre en el huerto, el gran diluvio en los días de Noé, y la dispersión de los pueblos en la Torre de Babel."

[01.03]
title = "Abraham, Isaac y Jacob"
description = "Dios llama a Abraham y hace un pacto con él. La fe de Abraham es probada. Jacob lucha con Dios y recibe un nombre nuevo — Israel."

[01.04]
title = "José en Egipto"
description = "José es vendido por sus hermanos, asciende al poder interpretando los sueños del Faraón, y perdona a sus hermanos cuando vienen a Egipto."

[01.05]
title = "Moisés y el Éxodo"
description = "Dios llama a Moisés desde la zarza ardiente. El cordero pascual salva a Israel. El Mar Rojo se abre. Dios da los Diez Mandamientos en el Sinaí."

[01.06]
title = "Israel en el desierto"
description = "Dios provee maná del cielo y agua de la roca. Moisés enseña a Israel el gran mandamiento: Amarás al SEÑOR tu Dios."

[01.07]
title = "La Tierra Prometida"
description = "Josué conduce a Israel a la Tierra Prometida. Las murallas de Jericó caen al sonido de las trompetas y el clamor del pueblo."

[01.08]
title = "Sansón y Dalila"
description = "Sansón, el poderoso juez, es traicionado por Dalila. Su fuerza le es quitada, pero en su último acto derriba el templo de los filisteos."

[01.09]
title = "La historia de Rut"
description = "Rut jura lealtad a Noemí: 'Donde tú vayas, yo iré.' Booz redime a Rut, y ella se convierte en antepasada del rey David."

[01.10]
title = "Samuel, Saúl y David"
description = "El niño Samuel oye el llamado de Dios. El pastor David vence al gigante Goliat. Dios hace un pacto eterno con David."

[01.11]
title = "Salomón el sabio"
description = "Salomón pide a Dios sabiduría y la recibe. Construye y dedica el Templo en Jerusalén como casa de oración para todas las naciones."

[01.12]
title = "Elías el profeta"
description = "Elías desafía a los profetas de Baal en el monte Carmelo. Cae fuego del cielo. Después, Dios habla a Elías en un silbo apacible y delicado."

[01.13]
title = "La historia de Jonás"
description = "Jonás huye de Dios y es tragado por un gran pez. Predica en Nínive, y la gran ciudad se arrepiente."

[01.14]
title = "Exilio y regreso"
description = "Jerusalén cae ante Babilonia y el pueblo es llevado al exilio. El rey Ciro de Persia decreta su regreso."

[01.15]
title = "Una profecía"
description = "Isaías anuncia un siervo sufriente que lleva los pecados de muchos, y un gobernante prometido cuyo reino no tendrá fin."

[02]
title = "Escenas del Nuevo Testamento"
description = "Cómo Jesús lo cambió todo — y lo que siguió tras la resurrección."

[02.01]
title = "En el principio"
description = "En el principio era el Verbo, y el Verbo era con Dios, y el Verbo era Dios. Y el Verbo se hizo carne y habitó entre nosotros."

[02.02]
title = "Jesús nace"
description = "Jesús nace en Belén. Los ángeles anuncian gran gozo a los pastores en los campos: ha nacido un Salvador."

[02.03]
title = "El sanador"
description = "Jesús sana a un leproso con un toque. Perdona y sana a un paralítico bajado por el techo por sus amigos."

[02.04]
title = "El maestro"
description = "Jesús enseña las Bienaventuranzas en el monte. Nombra el mandamiento más grande. Cuenta la parábola del hijo pródigo."

[02.05]
title = "La Crucifixión"
description = "Jesús comparte la última cena con sus discípulos. Es crucificado, muere, y al tercer día resucita de entre los muertos."

[02.06]
title = "Hechos de los apóstoles"
description = "El Espíritu Santo viene en Pentecostés con viento y fuego. Saulo encuentra al Cristo resucitado en el camino a Damasco y es transformado."

[02.07]
title = "Una visión"
description = "Juan ve un cielo nuevo y una tierra nueva. Dios morará con su pueblo. No habrá más muerte, ni llanto, ni dolor."

