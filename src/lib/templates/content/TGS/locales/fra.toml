# The Grand Story - French locale

title = "La grande histoire"
longTitle = "La grande histoire de la Bible"
description = "Un parcours à travers les moments clés de la Bible — du début à la fin."

[01]
title = "Scènes de l'Ancien Testament"
description = "L'histoire du peuple de Dieu — comment tout a commencé, leur parcours, et la promesse d'un sauveur à venir."

[01.01]
title = "Au commencement"
description = "Dieu crée les cieux et la terre, la lumière et les ténèbres, et forme l'homme de la poussière du sol."

[01.02]
title = "D'Éden à Babel"
description = "La chute de l'homme dans le jardin, le grand déluge au temps de Noé, et la dispersion des peuples à la tour de Babel."

[01.03]
title = "Abraham, Isaac et Jacob"
description = "Dieu appelle Abraham et conclut une alliance avec lui. La foi d'Abraham est mise à l'épreuve. Jacob lutte avec Dieu et reçoit un nouveau nom — Israël."

[01.04]
title = "Joseph en Égypte"
description = "Joseph est vendu par ses frères, accède au pouvoir en interprétant les songes de Pharaon, et pardonne à ses frères quand ils viennent en Égypte."

[01.05]
title = "Moïse et l'Exode"
description = "Dieu appelle Moïse depuis le buisson ardent. L'agneau pascal sauve Israël. La mer Rouge s'ouvre. Dieu donne les Dix Commandements au Sinaï."

[01.06]
title = "Israël dans le désert"
description = "Dieu donne la manne du ciel et l'eau du rocher. Moïse enseigne à Israël le grand commandement : Tu aimeras l'Éternel ton Dieu."

[01.07]
title = "La Terre promise"
description = "Josué conduit Israël dans la Terre promise. Les murailles de Jéricho s'écroulent au son des trompettes et au cri du peuple."

[01.08]
title = "Samson et Dalila"
description = "Samson, le puissant juge, est trahi par Dalila. Sa force lui est enlevée, mais dans son dernier acte il renverse le temple des Philistins."

[01.09]
title = "L'histoire de Ruth"
description = "Ruth jure fidélité à Naomi : « Où tu iras, j'irai. » Boaz rachète Ruth, et elle devient ancêtre du roi David."

[01.10]
title = "Samuel, Saül et David"
description = "Le jeune Samuel entend l'appel de Dieu. Le berger David vainc le géant Goliath. Dieu conclut une alliance éternelle avec David."

[01.11]
title = "Salomon le sage"
description = "Salomon demande à Dieu la sagesse et la reçoit. Il bâtit et consacre le Temple à Jérusalem comme maison de prière pour toutes les nations."

[01.12]
title = "Élie le prophète"
description = "Élie défie les prophètes de Baal sur le mont Carmel. Le feu tombe du ciel. Plus tard, Dieu parle à Élie dans un murmure doux et léger."

[01.13]
title = "L'histoire de Jonas"
description = "Jonas fuit devant Dieu et est englouti par un grand poisson. Il prêche à Ninive, et la grande ville se repent."

[01.14]
title = "Exil et retour"
description = "Jérusalem tombe aux mains de Babylone et le peuple est emmené en captivité. Le roi Cyrus de Perse décrète leur retour."

[01.15]
title = "Une prophétie"
description = "Ésaïe annonce un serviteur souffrant qui porte les péchés de beaucoup, et un souverain promis dont le règne n'aura pas de fin."

[02]
title = "Scènes du Nouveau Testament"
description = "Comment Jésus a tout changé — et ce qui a suivi après la résurrection."

[02.01]
title = "Au commencement"
description = "Au commencement était la Parole, et la Parole était avec Dieu, et la Parole était Dieu. La Parole a été faite chair et elle a habité parmi nous."

[02.02]
title = "Jésus est né"
description = "Jésus naît à Bethléem. Les anges annoncent une grande joie aux bergers dans les champs : un Sauveur est né."

[02.03]
title = "Le guérisseur"
description = "Jésus guérit un lépreux par un toucher. Il pardonne et guérit un paralytique descendu par le toit par ses amis."

[02.04]
title = "L'enseignant"
description = "Jésus enseigne les Béatitudes sur la montagne. Il nomme le plus grand commandement. Il raconte la parabole du fils perdu."

[02.05]
title = "La Crucifixion"
description = "Jésus partage la dernière Cène avec ses disciples. Il est crucifié, meurt, et le troisième jour il ressuscite d'entre les morts."

[02.06]
title = "Actes des apôtres"
description = "Le Saint-Esprit descend à la Pentecôte avec le vent et le feu. Saul rencontre le Christ ressuscité sur le chemin de Damas et est transformé."

[02.07]
title = "Une vision"
description = "Jean voit un nouveau ciel et une nouvelle terre. Dieu habitera avec son peuple. Il n'y aura plus ni mort, ni deuil, ni douleur."

