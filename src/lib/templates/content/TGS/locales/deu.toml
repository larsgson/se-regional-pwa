# The Grand Story - German locale

title = "Die große Geschichte"
longTitle = "Die große Geschichte der Bibel"
description = "Eine Reise durch Schlüsselmomente der Bibel — von Anfang bis Ende."

[01]
title = "Szenen aus dem Alten Testament"
description = "Die Geschichte von Gottes Volk — wie alles begann, ihr Weg und die Verheißung eines kommenden Retters."

[01.01]
title = "Am Anfang"
description = "Gott erschafft den Himmel und die Erde, Licht und Finsternis, und formt den Menschen aus dem Staub der Erde."

[01.02]
title = "Von Eden bis Babel"
description = "Der Sündenfall im Garten, die große Sintflut in den Tagen Noahs und die Zerstreuung der Völker beim Turmbau zu Babel."

[01.03]
title = "Abraham, Isaak und Jakob"
description = "Gott beruft Abraham und schließt einen Bund mit ihm. Abrahams Glaube wird geprüft. Jakob ringt mit Gott und empfängt einen neuen Namen — Israel."

[01.04]
title = "Josef in Ägypten"
description = "Josef wird von seinen Brüdern verkauft, steigt durch die Deutung von Pharaos Träumen zur Macht auf und vergibt seinen Brüdern, als sie nach Ägypten kommen."

[01.05]
title = "Mose und der Auszug"
description = "Gott beruft Mose aus dem brennenden Dornbusch. Das Passalamm rettet Israel. Das Rote Meer teilt sich. Gott gibt die Zehn Gebote am Sinai."

[01.06]
title = "Israel in der Wüste"
description = "Gott gibt Manna vom Himmel und Wasser aus dem Felsen. Mose lehrt Israel das große Gebot: Du sollst den HERRN, deinen Gott, lieben."

[01.07]
title = "Das verheißene Land"
description = "Josua führt Israel in das verheißene Land. Die Mauern von Jericho fallen beim Klang der Posaunen und dem Ruf des Volkes."

[01.08]
title = "Simson und Delila"
description = "Simson, der mächtige Richter, wird von Delila verraten. Seine Kraft wird ihm genommen, doch in seiner letzten Tat reißt er den Tempel der Philister nieder."

[01.09]
title = "Die Geschichte von Rut"
description = "Rut gelobt Noomi Treue: ‚Wo du hingehst, da will auch ich hingehen.' Boas löst Rut ein, und sie wird eine Vorfahrin König Davids."

[01.10]
title = "Samuel, Saul und David"
description = "Der Knabe Samuel hört Gottes Ruf. Der Hirte David besiegt den Riesen Goliat. Gott schließt einen ewigen Bund mit David."

[01.11]
title = "Salomo der Weise"
description = "Salomo bittet Gott um Weisheit und empfängt sie. Er baut den Tempel in Jerusalem und weiht ihn als Haus des Gebets für alle Völker."

[01.12]
title = "Elia der Prophet"
description = "Elia fordert die Propheten des Baal auf dem Berg Karmel heraus. Feuer fällt vom Himmel. Später spricht Gott zu Elia in einem stillen, sanften Säuseln."

[01.13]
title = "Die Geschichte von Jona"
description = "Jona flieht vor Gott und wird von einem großen Fisch verschlungen. Er predigt in Ninive, und die große Stadt tut Buße."

[01.14]
title = "Exil und Rückkehr"
description = "Jerusalem fällt an Babylon und das Volk wird ins Exil geführt. König Kyrus von Persien ordnet ihre Rückkehr an."

[01.15]
title = "Eine Prophezeiung"
description = "Jesaja sagt einen leidenden Knecht voraus, der die Sünden vieler trägt, und einen verheißenen Herrscher, dessen Reich kein Ende haben wird."

[02]
title = "Szenen aus dem Neuen Testament"
description = "Wie Jesus alles veränderte — und was nach der Auferstehung geschah."

[02.01]
title = "Am Anfang"
description = "Im Anfang war das Wort, und das Wort war bei Gott, und Gott war das Wort. Und das Wort ward Fleisch und wohnte unter uns."

[02.02]
title = "Jesus wird geboren"
description = "Jesus wird in Bethlehem geboren. Engel verkünden den Hirten auf den Feldern große Freude: Ein Heiland ist geboren."

[02.03]
title = "Der Heiler"
description = "Jesus heilt einen Aussätzigen durch eine Berührung. Er vergibt einem Gelähmten und heilt ihn, den seine Freunde durch das Dach hinabgelassen haben."

[02.04]
title = "Der Lehrer"
description = "Jesus lehrt die Seligpreisungen auf dem Berg. Er nennt das größte Gebot. Er erzählt das Gleichnis vom verlorenen Sohn."

[02.05]
title = "Die Kreuzigung"
description = "Jesus feiert das letzte Abendmahl mit seinen Jüngern. Er wird gekreuzigt, stirbt, und am dritten Tag ersteht er von den Toten."

[02.06]
title = "Taten der Apostel"
description = "Der Heilige Geist kommt an Pfingsten mit Wind und Feuer. Saulus begegnet dem auferstandenen Christus auf dem Weg nach Damaskus und wird verwandelt."

[02.07]
title = "Eine Vision"
description = "Johannes sieht einen neuen Himmel und eine neue Erde. Gott wird bei seinem Volk wohnen. Es wird keinen Tod, keine Trauer und keinen Schmerz mehr geben."

