# The Grand Story - Romanian locale

title = "Marea Poveste"
longTitle = "Marea Poveste a Bibliei"
description = "O călătorie prin momentele-cheie ale Bibliei — de la început până la sfârșit."

[01]
title = "Scene din Vechiul Testament"
description = "Povestea poporului lui Dumnezeu — cum a început totul, călătoria lor, și promisiunea unui mântuitor care va veni."

[01.01]
title = "La început"
description = "Dumnezeu creează cerurile și pământul, lumina și întunericul, și îl formează pe om din țărâna pământului."

[01.02]
title = "De la Eden la Babel"
description = "Căderea omului în grădină, marele potop în zilele lui Noe, și împrăștierea popoarelor la Turnul Babel."

[01.03]
title = "Avraam, Isaac și Iacov"
description = "Dumnezeu îl cheamă pe Avraam și face un legământ cu el. Credința lui Avraam este pusă la încercare. Iacov se luptă cu Dumnezeu și primește un nume nou — Israel."

[01.04]
title = "Iosif în Egipt"
description = "Iosif este vândut de frații săi, ajunge la putere interpretând visele lui Faraon, și își iartă frații când vin în Egipt."

[01.05]
title = "Moise și Exodul"
description = "Dumnezeu îl cheamă pe Moise din rugul aprins. Mielul de Paște salvează pe Israel. Marea Roșie se desparte. Dumnezeu dă Cele Zece Porunci la Sinai."

[01.06]
title = "Israel în pustie"
description = "Dumnezeu dă mană din cer și apă din stâncă. Moise îl învață pe Israel marea poruncă: Să iubești pe Domnul Dumnezeul tău."

[01.07]
title = "Țara Promisă"
description = "Iosua conduce pe Israel în Țara Promisă. Zidurile Ierihonului cad la sunetul trâmbițelor și la strigătul poporului."

[01.08]
title = "Samson și Dalila"
description = "Samson, judecătorul cel puternic, este trădat de Dalila. Puterea îi este luată, dar în ultimul său act el dărâmă templul filistenilor."

[01.09]
title = "Povestea Rutei"
description = 'Rut îi jură credință Naomiei: „Unde vei merge tu, voi merge și eu." Boaz o răscumpără pe Rut, și ea devine strămoașa regelui David.'

[01.10]
title = "Samuel, Saul și David"
description = "Copilul Samuel aude chemarea lui Dumnezeu. Păstorul David îl învinge pe uriașul Goliat. Dumnezeu face un legământ veșnic cu David."

[01.11]
title = "Solomon cel înțelept"
description = "Solomon îi cere lui Dumnezeu înțelepciune și o primește. El construiește și dedică Templul din Ierusalim ca o casă de rugăciune pentru toate popoarele."

[01.12]
title = "Ilie profetul"
description = "Ilie îi provoacă pe profeții lui Baal pe Muntele Carmel. Foc cade din cer. Mai târziu, Dumnezeu îi vorbește lui Ilie într-un glas blând și subțire."

[01.13]
title = "Povestea lui Iona"
description = "Iona fuge de Dumnezeu și este înghițit de un pește mare. El predică în Ninive, și marea cetate se pocăiește."

[01.14]
title = "Exilul și întoarcerea"
description = "Ierusalimul cade în mâna Babilonului și poporul este dus în robie. Împăratul Cirus al Persiei hotărăște întoarcerea lor."

[01.15]
title = "O profeție"
description = "Isaia vestește un rob suferind care poartă păcatele multora, și un conducător promis al cărui împărăție nu va avea sfârșit."

[02]
title = "Scene din Noul Testament"
description = "Cum a schimbat Isus totul — și ce a urmat după înviere."

[02.01]
title = "La început"
description = "La început era Cuvântul, și Cuvântul era cu Dumnezeu, și Cuvântul era Dumnezeu. Cuvântul S-a făcut trup și a locuit printre noi."

[02.02]
title = "Isus se naște"
description = "Isus se naște în Betleem. Îngerii vestesc păstorilor de pe câmpuri o mare bucurie: S-a născut un Mântuitor."

[02.03]
title = "Vindecătorul"
description = "Isus vindecă un lepros printr-o atingere. El iartă și vindecă un paralitic coborât prin acoperiș de prietenii săi."

[02.04]
title = "Învățătorul"
description = "Isus predică Fericirile pe munte. El numește cea mai mare poruncă. El spune pilda fiului risipitor."

[02.05]
title = "Răstignirea"
description = "Isus împarte Cina cea de Taină cu ucenicii săi. Este răstignit, moare, și a treia zi înviază din morți."

[02.06]
title = "Faptele apostolilor"
description = "Duhul Sfânt vine la Cincizecime cu vânt și foc. Saul Îl întâlnește pe Cristosul cel înviat pe drumul Damascului și este transformat."

[02.07]
title = "O viziune"
description = "Ioan vede un cer nou și un pământ nou. Dumnezeu va locui cu poporul Său. Nu va mai fi moarte, nici jale, nici durere."

