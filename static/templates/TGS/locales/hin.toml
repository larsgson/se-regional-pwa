# The Grand Story - Hindi locale

title = "महान कहानी"
longTitle = "बाइबल की महान कहानी"
description = "बाइबल के प्रमुख क्षणों की एक यात्रा — आरम्भ से अन्त तक।"

[01]
title = "पुराने नियम के दृश्य"
description = "परमेश्वर के लोगों की कहानी — सब कुछ कैसे शुरू हुआ, उनकी यात्रा, और एक आने वाले उद्धारकर्ता की प्रतिज्ञा।"

[01.01]
title = "आदि में"
description = "परमेश्वर ने आकाश और पृथ्वी, उजियाला और अंधकार की सृष्टि की, और भूमि की मिट्टी से मनुष्य को रचा।"

[01.02]
title = "अदन से बाबेल तक"
description = "बगीचे में मनुष्य का पतन, नूह के दिनों में महाजलप्रलय, और बाबेल की मीनार पर लोगों का बिखरना।"

[01.03]
title = "अब्राहम, इसहाक और याकूब"
description = "परमेश्वर ने अब्राहम को बुलाया और उसके साथ वाचा बाँधी। अब्राहम के विश्वास की परीक्षा हुई। याकूब ने परमेश्वर से कुश्ती की और एक नया नाम पाया — इस्राएल।"

[01.04]
title = "मिस्र में यूसुफ"
description = "यूसुफ को उसके भाइयों ने बेच दिया, फिरौन के स्वप्नों की व्याख्या करके वह सत्ता में आया, और जब उसके भाई मिस्र आए तो उसने उन्हें क्षमा किया।"

[01.05]
title = "मूसा और निर्गमन"
description = "परमेश्वर ने जलती हुई झाड़ी से मूसा को बुलाया। फसह के मेमने ने इस्राएल को बचाया। लाल सागर दो भागों में बँटा। परमेश्वर ने सीनै पर दस आज्ञाएँ दीं।"

[01.06]
title = "जंगल में इस्राएल"
description = "परमेश्वर ने स्वर्ग से मन्ना और चट्टान से पानी दिया। मूसा ने इस्राएल को महान आज्ञा सिखाई: अपने परमेश्वर यहोवा से प्रेम करो।"

[01.07]
title = "प्रतिज्ञा का देश"
description = "यहोशू ने इस्राएल को प्रतिज्ञा के देश में पहुँचाया। तुरहियों की आवाज़ और लोगों के जयजयकार से यरीहो की दीवारें गिर गईं।"

[01.08]
title = "शिमशोन और दलीला"
description = "शिमशोन, शक्तिशाली न्यायी, दलीला द्वारा धोखा दिया गया। उसकी शक्ति छीन ली गई, परन्तु अपने अंतिम कार्य में उसने पलिश्तियों का मन्दिर गिरा दिया।"

[01.09]
title = "रूत की कहानी"
description = "रूत ने नाओमी से वफ़ादारी का वचन दिया: 'जहाँ तू जाएगी, मैं भी जाऊँगी।' बोअज़ ने रूत को छुड़ाया, और वह राजा दाऊद की पूर्वज बनी।"

[01.10]
title = "शमूएल, शाऊल और दाऊद"
description = "बालक शमूएल ने परमेश्वर की पुकार सुनी। चरवाहे दाऊद ने दानव गोलियत को हराया। परमेश्वर ने दाऊद के साथ सदा की वाचा बाँधी।"

[01.11]
title = "बुद्धिमान सुलैमान"
description = "सुलैमान ने परमेश्वर से बुद्धि माँगी और पाई। उसने यरूशलेम में मन्दिर बनाया और उसे सब जातियों के लिए प्रार्थना का घर समर्पित किया।"

[01.12]
title = "एलिय्याह भविष्यवक्ता"
description = "एलिय्याह ने कर्मेल पर्वत पर बाल के भविष्यवक्ताओं को चुनौती दी। स्वर्ग से आग उतरी। बाद में, परमेश्वर ने एलिय्याह से धीमी शान्त आवाज़ में बात की।"

[01.13]
title = "योना की कहानी"
description = "योना परमेश्वर से भागा और एक बड़ी मछली ने उसे निगल लिया। उसने नीनवे में प्रचार किया, और उस बड़े नगर ने पश्चाताप किया।"

[01.14]
title = "बंधुआई और वापसी"
description = "यरूशलेम बाबेल के हाथों गिरा और लोग बंधुआई में ले जाए गए। फारस के राजा कुस्रू ने उनकी वापसी का आदेश दिया।"

[01.15]
title = "एक भविष्यवाणी"
description = "यशायाह ने एक दुखी सेवक की भविष्यवाणी की जो बहुतों के पापों को उठाएगा, और एक प्रतिज्ञात शासक की जिसके राज्य का कोई अन्त न होगा।"

[02]
title = "नए नियम के दृश्य"
description = "यीशु ने कैसे सब कुछ बदल दिया — और पुनरुत्थान के बाद क्या हुआ।"

[02.01]
title = "आदि में"
description = "आदि में वचन था, और वचन परमेश्वर के साथ था, और वचन परमेश्वर था। वचन देहधारी हुआ और हमारे बीच में डेरा किया।"

[02.02]
title = "यीशु का जन्म"
description = "यीशु का जन्म बेतलेहेम में हुआ। स्वर्गदूतों ने मैदान में चरवाहों को बड़े आनन्द का समाचार सुनाया: एक उद्धारकर्ता जन्मा है।"

[02.03]
title = "चंगा करने वाला"
description = "यीशु ने छूकर एक कोढ़ी को चंगा किया। उसने एक लकवे के रोगी को क्षमा किया और चंगा किया जिसे उसके मित्रों ने छत से उतारा था।"

[02.04]
title = "शिक्षक"
description = "यीशु ने पहाड़ पर धन्य वचन सिखाए। उसने सबसे बड़ी आज्ञा बताई। उसने खोए हुए पुत्र का दृष्टान्त सुनाया।"

[02.05]
title = "सूली पर चढ़ाना"
description = "यीशु ने अपने चेलों के साथ अन्तिम भोज किया। उसे क्रूस पर चढ़ाया गया, वह मरा, और तीसरे दिन मृतकों में से जी उठा।"

[02.06]
title = "प्रेरितों के काम"
description = "पिन्तेकुस्त पर पवित्र आत्मा आँधी और आग के साथ उतरा। शाऊल ने दमिश्क के मार्ग पर जीवित मसीह से भेंट की और बदल गया।"

[02.07]
title = "एक दर्शन"
description = "यूहन्ना ने नया स्वर्ग और नई पृथ्वी देखी। परमेश्वर अपने लोगों के साथ वास करेगा। फिर न मृत्यु होगी, न शोक, न पीड़ा।"

