# The Grand Story - Swedish locale

title = "Den stora berättelsen"
longTitle = "Bibelns stora berättelse"
description = "En resa genom Bibelns viktigaste ögonblick — från början till slut."

[01]
title = "Scener ur Gamla testamentet"
description = "Berättelsen om Guds folk — hur allt började, deras resa, och löftet om en kommande frälsare."

[01.01]
title = "I begynnelsen"
description = "Gud skapar himmel och jord, ljus och mörker, och formar människan av jordens stoft."

[01.02]
title = "Från Eden till Babel"
description = "Människans fall i lustgården, den stora floden på Noas tid, och folkens förskingring vid Babels torn."

[01.03]
title = "Abraham, Isak och Jakob"
description = "Gud kallar Abraham och sluter ett förbund med honom. Abrahams tro prövas. Jakob brottas med Gud och får ett nytt namn — Israel."

[01.04]
title = "Josef i Egypten"
description = "Josef säljs av sina bröder, stiger till makten genom att tyda Faraos drömmar, och förlåter sina bröder när de kommer till Egypten."

[01.05]
title = "Mose och Uttåget"
description = "Gud kallar Mose ur den brinnande busken. Påskalammet räddar Israel. Röda havet delar sig. Gud ger de Tio budorden vid Sinai."

[01.06]
title = "Israel i öknen"
description = "Gud ger manna från himlen och vatten ur klippan. Mose lär Israel det stora budet: Du skall älska Herren din Gud."

[01.07]
title = "Det utlovade landet"
description = "Josua leder Israel in i det utlovade landet. Jerikos murar faller vid ljudet av basuner och folkets rop."

[01.08]
title = "Simson och Delila"
description = "Simson, den mäktige domaren, förråds av Delila. Hans styrka tas ifrån honom, men i sin sista gärning störtar han filistéernas tempel."

[01.09]
title = "Berättelsen om Rut"
description = "Rut lovar Noomi trohet: 'Dit du går, vill jag gå.' Boas löser Rut, och hon blir stammoder till kung David."

[01.10]
title = "Samuel, Saul och David"
description = "Pojken Samuel hör Guds röst. Herden David besegrar jätten Goljat. Gud sluter ett evigt förbund med David."

[01.11]
title = "Salomo den vise"
description = "Salomo ber Gud om vishet och får den. Han bygger och inviger Templet i Jerusalem som ett bönehus för alla folk."

[01.12]
title = "Elia profeten"
description = "Elia utmanar Baals profeter på berget Karmel. Eld faller från himlen. Senare talar Gud till Elia i en stilla susning."

[01.13]
title = "Berättelsen om Jona"
description = "Jona flyr från Gud och sväljs av en stor fisk. Han predikar i Nineve, och den stora staden omvänder sig."

[01.14]
title = "Fångenskap och återkomst"
description = "Jerusalem faller för Babylon och folket förs i fångenskap. Kung Kores av Persien befaller deras återvändo."

[01.15]
title = "En profetia"
description = "Jesaja förutsäger en lidande tjänare som bär mångas synder, och en utlovad härskare vars rike aldrig skall ta slut."

[02]
title = "Scener ur Nya testamentet"
description = "Hur Jesus förändrade allt — och vad som följde efter uppståndelsen."

[02.01]
title = "I begynnelsen"
description = "I begynnelsen var Ordet, och Ordet var hos Gud, och Ordet var Gud. Och Ordet blev kött och bodde bland oss."

[02.02]
title = "Jesus föds"
description = "Jesus föds i Betlehem. Änglar förkunnar stor glädje för herdar på fälten: en Frälsare är född."

[02.03]
title = "Helaren"
description = "Jesus botar en spetälsk med en beröring. Han förlåter och botar en lam man som hans vänner sänkt ner genom taket."

[02.04]
title = "Läraren"
description = "Jesus undervisar om Saligprisningarna på berget. Han nämner det största budet. Han berättar liknelsen om den förlorade sonen."

[02.05]
title = "Korsfästelsen"
description = "Jesus delar den sista måltiden med sina lärjungar. Han korsfästs, dör, och på tredje dagen uppstår han från de döda."

[02.06]
title = "Apostlarnas gärningar"
description = "Den helige Ande kommer vid Pingst med vind och eld. Saulus möter den uppståndne Kristus på vägen till Damaskus och förvandlas."

[02.07]
title = "En syn"
description = "Johannes ser en ny himmel och en ny jord. Gud skall bo hos sitt folk. Döden skall inte finnas mer, inte heller sorg eller smärta."

