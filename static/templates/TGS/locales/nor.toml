# The Grand Story - Norwegian locale

title = "Den store fortellingen"
longTitle = "Bibelens store fortelling"
description = "En reise gjennom Bibelens viktigste øyeblikk — fra begynnelsen til slutten."

[01]
title = "Scener fra Det gamle testamentet"
description = "Fortellingen om Guds folk — hvordan alt begynte, deres reise, og løftet om en kommende frelser."

[01.01]
title = "I begynnelsen"
description = "Gud skaper himmel og jord, lys og mørke, og former mennesket av jordens støv."

[01.02]
title = "Fra Eden til Babel"
description = "Menneskets fall i Edens hage, den store flommen på Noahs tid, og folkenes spredning ved Babels tårn."

[01.03]
title = "Abraham, Isak og Jakob"
description = "Gud kaller Abraham og slutter en pakt med ham. Abrahams tro prøves. Jakob bryter med Gud og får et nytt navn — Israel."

[01.04]
title = "Josef i Egypt"
description = "Josef selges av sine brødre, stiger til makten ved å tyde Faraos drømmer, og tilgir sine brødre når de kommer til Egypt."

[01.05]
title = "Moses og utgangen fra Egypt"
description = "Gud kaller Moses fra den brennende busken. Påskelammet redder Israel. Rødehavet deler seg. Gud gir De ti bud ved Sinai."

[01.06]
title = "Israel i ørkenen"
description = "Gud gir manna fra himmelen og vann fra klippen. Moses lærer Israel det store budet: Du skal elske Herren din Gud."

[01.07]
title = "Det lovede land"
description = "Josva leder Israel inn i det lovede land. Jerikos murer faller ved lyden av basuner og folkets rop."

[01.08]
title = "Samson og Dalila"
description = "Samson, den mektige dommeren, forrådes av Dalila. Hans styrke tas fra ham, men i sin siste gjerning styrter han filisternes tempel."

[01.09]
title = "Fortellingen om Rut"
description = "Rut lover Noomi troskap: 'Hvor du går, vil jeg gå.' Boas løser Rut, og hun blir stammor til kong David."

[01.10]
title = "Samuel, Saul og David"
description = "Gutten Samuel hører Guds stemme. Gjeteren David beseirer kjempen Goliat. Gud slutter en evig pakt med David."

[01.11]
title = "Salomo den vise"
description = "Salomo ber Gud om visdom og får den. Han bygger og innvier Tempelet i Jerusalem som et bønnehus for alle folk."

[01.12]
title = "Elia profeten"
description = "Elia utfordrer Baals profeter på fjellet Karmel. Ild faller fra himmelen. Senere taler Gud til Elia i en stille susen."

[01.13]
title = "Fortellingen om Jona"
description = "Jona flykter fra Gud og svelges av en stor fisk. Han forkynner i Ninive, og den store byen omvender seg."

[01.14]
title = "Fangenskap og tilbakekomst"
description = "Jerusalem faller for Babylon og folket føres i fangenskap. Kong Kyros av Persia befaler deres tilbakevending."

[01.15]
title = "En profeti"
description = "Jesaja forutsier en lidende tjener som bærer manges synder, og en lovet hersker hvis rike aldri skal ta slutt."

[02]
title = "Scener fra Det nye testamentet"
description = "Hvordan Jesus forandret alt — og hva som fulgte etter oppstandelsen."

[02.01]
title = "I begynnelsen"
description = "I begynnelsen var Ordet, og Ordet var hos Gud, og Ordet var Gud. Og Ordet ble kjød og tok bolig blant oss."

[02.02]
title = "Jesus blir født"
description = "Jesus blir født i Betlehem. Engler forkynner stor glede for gjetere på markene: en Frelser er født."

[02.03]
title = "Helbrederen"
description = "Jesus helbreder en spedalsk med en berøring. Han tilgir og helbreder en lam mann som vennene hans senket ned gjennom taket."

[02.04]
title = "Læreren"
description = "Jesus underviser om Saligprisningene på fjellet. Han nevner det største budet. Han forteller lignelsen om den bortkomne sønnen."

[02.05]
title = "Korsfestelsen"
description = "Jesus deler det siste måltidet med disiplene. Han korsfestes, dør, og på tredje dagen oppstår han fra de døde."

[02.06]
title = "Apostlenes gjerninger"
description = "Den hellige ånd kommer ved pinse med vind og ild. Saulus møter den oppstandne Kristus på veien til Damaskus og forvandles."

[02.07]
title = "Et syn"
description = "Johannes ser en ny himmel og en ny jord. Gud skal bo hos sitt folk. Døden skal ikke finnes mer, heller ikke sorg eller smerte."

