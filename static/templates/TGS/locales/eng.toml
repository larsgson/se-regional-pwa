# The Grand Story - English locale

title = "The Grand Story"
longTitle = "The Grand Story of the Bible"
description = "A journey through key moments in the Bible — from start to finish."

[01]
title = "Scenes from the Old Testament"
description = "The story of God's people — how it all began, their journey, and the promise of a coming saviour."

[01.01]
title = "In the beginning"
description = "God creates the heavens and the earth, light and darkness, and forms man from the dust of the ground."

[01.02]
title = "From Eden to Babel"
description = "The fall of man in the Garden, the great flood in the days of Noah, and the scattering of peoples at the Tower of Babel."

[01.03]
title = "Abraham, Isaac and Jacob"
description = "God calls Abraham and makes a covenant with him. Abraham's faith is tested. Jacob wrestles with God and receives a new name — Israel."

[01.04]
title = "Joseph in Egypt"
description = "Joseph is sold by his brothers, rises to power by interpreting Pharaoh's dreams, and forgives his brothers when they come to Egypt."

[01.05]
title = "Moses and the Exodus"
description = "God calls Moses from the burning bush. The Passover lamb saves Israel. The Red Sea parts. God gives the Ten Commandments at Sinai."

[01.06]
title = "Israel in the wilderness"
description = "God provides manna from heaven and water from the rock. Moses teaches Israel the great commandment: Love the LORD your God."

[01.07]
title = "The Promised Land"
description = "Joshua leads Israel into the Promised Land. The walls of Jericho fall at the sound of trumpets and the shout of the people."

[01.08]
title = "Samson and Delilah"
description = "Samson, the mighty judge, is betrayed by Delilah. His strength is taken, but in his final act he brings down the Philistine temple."

[01.09]
title = "The story of Ruth"
description = "Ruth pledges loyalty to Naomi: 'Where you go I will go.' Boaz redeems Ruth, and she becomes an ancestor of King David."

[01.10]
title = "Samuel, Saul and David"
description = "The boy Samuel hears God's call. The shepherd David defeats the giant Goliath. God makes an everlasting covenant with David."

[01.11]
title = "Solomon the sage"
description = "Solomon asks God for wisdom and receives it. He builds and dedicates the Temple in Jerusalem as a house of prayer for all nations."

[01.12]
title = "Elijah the prophet"
description = "Elijah challenges the prophets of Baal on Mount Carmel. Fire falls from heaven. Later, God speaks to Elijah in a still small voice."

[01.13]
title = "The story of Jonah"
description = "Jonah flees from God and is swallowed by a great fish. He preaches to Nineveh, and the great city repents."

[01.14]
title = "Exile and return"
description = "Jerusalem falls to Babylon and the people are carried into exile. King Cyrus of Persia decrees their return."

[01.15]
title = "A prophecy"
description = "Isaiah foretells a suffering servant who bears the sins of many, and a promised ruler whose kingdom will have no end."

[02]
title = "Scenes from the New Testament"
description = "How Jesus changed everything — and what followed after the resurrection."

[02.01]
title = "In the beginning"
description = "In the beginning was the Word, and the Word was with God, and the Word was God. The Word became flesh and dwelt among us."

[02.02]
title = "Jesus is born"
description = "Jesus is born in Bethlehem. Angels announce great joy to shepherds in the fields: a Saviour has been born."

[02.03]
title = "The healer"
description = "Jesus heals a man with leprosy with a touch. He forgives and heals a paralytic lowered through the roof by his friends."

[02.04]
title = "The teacher"
description = "Jesus teaches the Beatitudes on the mountain. He names the greatest commandment. He tells the parable of the lost son."

[02.05]
title = "The Crucifixion"
description = "Jesus shares the Last Supper with his disciples. He is crucified, dies, and on the third day rises from the dead."

[02.06]
title = "Acts of the apostles"
description = "The Holy Spirit comes at Pentecost with wind and fire. Saul meets the risen Christ on the road to Damascus and is transformed."

[02.07]
title = "A vision"
description = "John sees a new heaven and a new earth. God will dwell with his people. There will be no more death or mourning or pain."

