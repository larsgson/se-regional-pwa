# The Grand Story - Portuguese locale

title = "A Grande História"
longTitle = "A Grande História da Bíblia"
description = "Uma jornada pelos momentos-chave da Bíblia — do início ao fim."

[01]
title = "Cenas do Antigo Testamento"
description = "A história do povo de Deus — como tudo começou, a sua jornada, e a promessa de um salvador que viria."

[01.01]
title = "No princípio"
description = "Deus cria os céus e a terra, a luz e as trevas, e forma o homem do pó da terra."

[01.02]
title = "Do Éden a Babel"
description = "A queda do homem no jardim, o grande dilúvio nos dias de Noé, e a dispersão dos povos na Torre de Babel."

[01.03]
title = "Abraão, Isaque e Jacó"
description = "Deus chama Abraão e faz uma aliança com ele. A fé de Abraão é provada. Jacó luta com Deus e recebe um novo nome — Israel."

[01.04]
title = "José no Egito"
description = "José é vendido pelos seus irmãos, ascende ao poder interpretando os sonhos do Faraó, e perdoa os seus irmãos quando vêm ao Egito."

[01.05]
title = "Moisés e o Êxodo"
description = "Deus chama Moisés da sarça ardente. O cordeiro pascal salva Israel. O Mar Vermelho se abre. Deus dá os Dez Mandamentos no Sinai."

[01.06]
title = "Israel no deserto"
description = "Deus provê maná do céu e água da rocha. Moisés ensina a Israel o grande mandamento: Amarás o SENHOR teu Deus."

[01.07]
title = "A Terra Prometida"
description = "Josué conduz Israel à Terra Prometida. As muralhas de Jericó caem ao som das trombetas e ao grito do povo."

[01.08]
title = "Sansão e Dalila"
description = "Sansão, o poderoso juiz, é traído por Dalila. A sua força é tirada, mas no seu último ato ele derruba o templo dos filisteus."

[01.09]
title = "A história de Rute"
description = "Rute jura lealdade a Noemi: 'Onde tu fores, eu irei.' Boaz resgata Rute, e ela se torna antepassada do rei Davi."

[01.10]
title = "Samuel, Saul e Davi"
description = "O menino Samuel ouve o chamado de Deus. O pastor Davi vence o gigante Golias. Deus faz uma aliança eterna com Davi."

[01.11]
title = "Salomão, o sábio"
description = "Salomão pede sabedoria a Deus e a recebe. Ele constrói e dedica o Templo em Jerusalém como casa de oração para todas as nações."

[01.12]
title = "Elias, o profeta"
description = "Elias desafia os profetas de Baal no monte Carmelo. Fogo cai do céu. Depois, Deus fala a Elias numa voz mansa e suave."

[01.13]
title = "A história de Jonas"
description = "Jonas foge de Deus e é engolido por um grande peixe. Ele prega em Nínive, e a grande cidade se arrepende."

[01.14]
title = "Exílio e regresso"
description = "Jerusalém cai nas mãos de Babilónia e o povo é levado para o exílio. O rei Ciro da Pérsia decreta o seu regresso."

[01.15]
title = "Uma profecia"
description = "Isaías prediz um servo sofredor que carrega os pecados de muitos, e um governante prometido cujo reino não terá fim."

[02]
title = "Cenas do Novo Testamento"
description = "Como Jesus mudou tudo — e o que se seguiu após a ressurreição."

[02.01]
title = "No princípio"
description = "No princípio era o Verbo, e o Verbo estava com Deus, e o Verbo era Deus. O Verbo se fez carne e habitou entre nós."

[02.02]
title = "Jesus nasce"
description = "Jesus nasce em Belém. Anjos anunciam grande alegria aos pastores nos campos: nasceu um Salvador."

[02.03]
title = "O curador"
description = "Jesus cura um leproso com um toque. Ele perdoa e cura um paralítico descido pelo telhado pelos seus amigos."

[02.04]
title = "O mestre"
description = "Jesus ensina as Bem-aventuranças no monte. Ele nomeia o maior mandamento. Ele conta a parábola do filho perdido."

[02.05]
title = "A Crucificação"
description = "Jesus partilha a última ceia com os seus discípulos. É crucificado, morre, e ao terceiro dia ressuscita dos mortos."

[02.06]
title = "Atos dos apóstolos"
description = "O Espírito Santo vem no Pentecostes com vento e fogo. Saulo encontra o Cristo ressuscitado no caminho de Damasco e é transformado."

[02.07]
title = "Uma visão"
description = "João vê um novo céu e uma nova terra. Deus habitará com o seu povo. Não haverá mais morte, nem luto, nem dor."

