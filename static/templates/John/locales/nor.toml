# Johannesevangeliet - Norwegian locale

title = "Johannesevangeliet"
longTitle = "Det glade budskap ifølge Johannes"
description = "Jesu elskede disippel Johannes forteller om ham som var fra begynnelsen. Gjennom Jesus ga Gud oss nåde og sannhet. Gjennom ham blir vi Guds barn."
video_url = "https://www.youtube.com/embed/XWpCBMJ2xMo"

[01]
title = "Ordet blant oss"
description = "Kapittel 1–12: Fra Ordets inkarnasjon til Jesu inntog i Jerusalem"

[01.01]
title = "Guds levende Ord"
description = "Guds Ord ble kjød og tok bolig blant oss. Døperen Johannes vitnet om ham. Andreas fortalte Simon Peter, og de fulgte Jesus."

[01.02]
title = "Bryllupet i Kana"
description = "Jesus forvandlet vann til vin på et bryllup. Han drev ut pengevekslerne fra tempelet. Han sa: «Bryt ned dette tempelet, og jeg skal reise det opp.»"

[01.03]
title = "Nikodemus"
description = "Jesus sa til Nikodemus: «Du må bli født på ny. Den som tror på Sønnen, skal ha evig liv.» Døperen Johannes sa: «Han er over alle.»"

[01.04]
title = "Den samaritanske kvinnen"
description = "Jesus talte med en samaritansk kvinne om hennes menn. Hun sa: «Kan dette være Messias?» Mange kom til tro. Han helbredet en embetsmanns sønn."

[01.05]
title = "Den lamme helbredes"
description = "Jesus helbredet en mann ved Betesda. Han sa: «Sønnen gjør bare det han ser Faderen gjøre. Mine gjerninger og Skriftene vitner om meg.»"

[01.06]
title = "Livets brød"
description = "Jesus mettet 5 000 menn og gikk på vannet. Han sa: «Jeg er livets brød. Mitt kjød er virkelig mat.» Mange disipler vendte tilbake."

[01.07]
title = "Strømmer av levende vann"
description = "Jesus gikk til høytiden. Folket sa: «Er dette Messias?» Øversteprestene forsøkte å gripe ham. Han ropte: «Kom og drikk.»"

[01.08]
title = "Abrahams etterkommere"
description = "Jesus fordømte ikke en kvinne grepet for ekteskapsbrudd. Fariseerne utfordret ham. Han sa: «Om Gud var deres Far, ville dere elske meg.»"

[01.09]
title = "Den blinde helbredes"
description = "Jesus helbredet en blind mann på sabbaten. Fariseerne kalte inn mannen og kastet ham ut. Jesus sa: «Jeg er kommet for at blinde skal se.»"

[01.10]
title = "Hyrde og fårefold"
description = "Jesus sa: «Jeg er den gode hyrden. Jeg gir mitt liv for fårene.» De spurte: «Er du Messias?» Han sa: «Mine får følger meg.»"

[01.11]
title = "Lasarus"
description = "Lasarus døde. Jesus gikk til graven og sa: «Lasarus, kom ut.» Lasarus kom ut. Øversteprestene planla å drepe Jesus."

[01.12]
title = "Inntoget i Jerusalem"
description = "Jesus red inn i Jerusalem. Folket ropte: «Hosianna!» Han sa: «Menneskesønnen må opphøyes. Jeg er kommet for å frelse verden.»"

[02]
title = "Jesus og hans disipler"
description = "Kapittel 13–17: Det siste måltidet, avskjedstalene og Jesu bønn"

[02.13]
title = "Fotvaskingen"
description = "Jesus vasket disiplenes føtter. Han sa: «En av dere skal forråde meg.» Judas gikk ut. Jesus sa: «Elsk hverandre som jeg har elsket dere.»"

[02.14]
title = "Veien, sannheten og livet"
description = "«Jeg er veien, sannheten og livet. Jeg er i Faderen og Faderen i meg. Han skal gi dere Den hellige ånd. Vær ikke redde.»"

[02.15]
title = "Vintreet og grenene"
description = "«Jeg er vintreet, dere er grenene. Dere er mine venner om dere gjør det jeg befaler. Om de forfulgte meg, skal de også forfølge dere.»"

[02.16]
title = "Den hellige ånds komme"
description = "«Ånden skal overbevise verden om synd. Han skal lede dere til hele sannheten. Deres sorg skal vendes til glede. Jeg går til Faderen.»"

[02.17]
title = "Jesu bønn for sine disipler"
description = "Jesus sa: «Far, jeg har åpenbart ditt navn for dem du ga meg. Hellige dem i sannheten. Må alle som tror på meg, være ett.»"

[03]
title = "Korset og oppstandelsen"
description = "Kapittel 18–21: Arrestasjon, korsfestelse, oppstandelse og gjenopprettelse"

[03.18]
title = "Arrestasjon og rettssak"
description = "Judas forrådte Jesus til øversteprestene. Peter fornektet ham. Han ble ført for Pilatus. Jesus sa: «Mitt rike er ikke av denne verden.»"

[03.19]
title = "Død for syndene"
description = "Soldatene tok Jesus og korsfestet ham. Han sa: «Det er fullbrakt.» Han ga opp sin ånd. En soldat stakk ham i siden med et spyd."

[03.20]
title = "Oppstandelsen"
description = "Maria gikk til graven og fant den tom. Jesus møtte henne. Han kom og sto blant disiplene. Tomas sa: «Min Herre og min Gud!»"

[03.21]
title = "Tiberiassjøen"
description = "Jesus viste seg da disiplene fisket. Han sa til Peter: «Elsker du meg? Vær hyrde for mine får.» Den elskede disippelen har vitnet."

